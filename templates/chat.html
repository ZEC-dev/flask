<!-- templates/chat.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密聊天室</title>
    <script src="https://fastly.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/gh/ZEC-dev/IcoCdn@main/css/all.min.css">
    <style>
        .message-bubble {
            max-width: 70%;
            word-wrap: break-word;
        }
        .message-own {
            margin-left: auto;
        }
        .message-own .message-bubble {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
        }
        .message-other .message-bubble {
            background: #f3f4f6;
            color: #1f2937;
        }
        .message-input:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message-item {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">
    <!-- 顶部导航 -->
    <header class="sticky top-0 z-50 w-full bg-white shadow-md">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <i class="icofont-chat text-2xl text-blue-600"></i>
                    <span class="text-xl font-bold text-gray-800">加密聊天</span>
                    <span class="text-xs bg-green-100 text-green-600 px-2 py-1 rounded">端到端加密</span>
                </div>
                
                <div class="flex items-center space-x-4">
                    <div class="relative group">
                        <button class="flex items-center space-x-2 p-1 rounded-full hover:bg-gray-100 transition-colors">
                            <div class="w-8 h-8 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
                                <span class="text-white font-semibold">{{ username[0:2]|upper }}</span>
                            </div>
                            <i class="icofont-simple-down text-gray-400"></i>
                        </button>
                        
                        <div class="absolute right-0 top-full mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300">
                            <div class="p-4 border-b border-gray-100">
                                <p class="font-semibold text-gray-800">{{ username }}</p>
                                <p class="text-sm text-gray-500">在线</p>
                            </div>
                            <div class="py-2">
                                <a href="/logout" class="flex items-center px-4 py-2 text-red-600 hover:bg-gray-100">
                                    <i class="icofont-logout mr-3"></i>退出登录
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- 聊天主区域 -->
    <div class="flex-1 flex overflow-hidden">
        <!-- 用户列表侧边栏 -->
        <div class="w-64 bg-white border-r border-gray-200 hidden md:block overflow-y-auto">
            <div class="p-4 border-b border-gray-200">
                <h2 class="font-semibold text-gray-700">在线用户</h2>
            </div>
            <div id="userList" class="p-2">
                <!-- 用户列表将动态加载 -->
            </div>
        </div>
        
        <!-- 聊天区域 -->
        <div class="flex-1 flex flex-col">
            <!-- 消息列表 -->
            <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- 消息将动态加载 -->
            </div>
            
            <!-- 输入区域 -->
            <div class="bg-white border-t border-gray-200 p-4">
                <div class="flex space-x-4">
                    <input type="text" id="messageInput" placeholder="输入消息..." 
                           class="message-input flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button id="sendButton" 
                            class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition flex items-center">
                        <i class="icofont-paper-plane mr-2"></i>
                        发送
                    </button>
                </div>
                <p class="text-xs text-gray-500 mt-2">
                    <i class="icofont-lock mr-1"></i>
                    消息经过端到端加密，只有您能解密
                </p>
            </div>
        </div>
    </div>
    
    <script src="https://fastly.jsdelivr.net/gh/ZEC-dev/IcoCdn@main/js/all.min.js"></script>
    <script>
        const username = '{{ username }}';
        let lastMessageCount = 0;
        
        // 加载用户列表
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();
                
                const userList = document.getElementById('userList');
                userList.innerHTML = '';
                
                users.forEach(user => {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'flex items-center space-x-2 p-2 hover:bg-gray-50 rounded-lg cursor-pointer';
                    userDiv.innerHTML = `
                        <div class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center">
                            <span class="text-sm font-semibold">${user.username[0].toUpperCase()}</span>
                        </div>
                        <span class="text-sm text-gray-700">${user.username}</span>
                        <span class="w-2 h-2 bg-green-500 rounded-full ml-auto"></span>
                    `;
                    userList.appendChild(userDiv);
                });
            } catch (error) {
                console.error('加载用户列表失败:', error);
            }
        }
        
        // 加载消息
        async function loadMessages() {
            try {
                const response = await fetch('/api/messages');
                const messages = await response.json();
                
                if (messages.length !== lastMessageCount) {
                    const messagesDiv = document.getElementById('messages');
                    messagesDiv.innerHTML = '';
                    
                    messages.forEach(msg => {
                        const messageDiv = document.createElement('div');
                        messageDiv.className = `message-item flex ${msg.is_own ? 'message-own' : 'message-other'}`;
                        
                        const time = new Date(msg.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                        
                        messageDiv.innerHTML = `
                            <div class="message-bubble rounded-lg p-3 max-w-[70%]">
                                ${!msg.is_own ? `<div class="text-xs text-gray-500 mb-1">${msg.sender}</div>` : ''}
                                <div class="text-sm">${msg.content}</div>
                                <div class="text-xs ${msg.is_own ? 'text-blue-100' : 'text-gray-400'} text-right mt-1">${time}</div>
                            </div>
                        `;
                        
                        messagesDiv.appendChild(messageDiv);
                    });
                    
                    // 滚动到底部
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    lastMessageCount = messages.length;
                }
            } catch (error) {
                console.error('加载消息失败:', error);
            }
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) return;
            
            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: content,
                        recipient: 'all'
                    })
                });
                
                if (response.ok) {
                    input.value = '';
                    await loadMessages();
                }
            } catch (error) {
                console.error('发送消息失败:', error);
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadUsers();
            loadMessages();
            
            // 每3秒检查新消息
            setInterval(loadMessages, 3000);
            
            // 发送消息
            document.getElementById('sendButton').addEventListener('click', sendMessage);
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>
