<!-- templates/register.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 加密聊天</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/gh/ZEC-dev/IcoCdn@main/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <div class="text-center mb-8">
                <i class="icofont-chat text-5xl text-blue-600 mb-4"></i>
                <h1 class="text-2xl font-bold text-gray-800">创建账号</h1>
                <p class="text-gray-600">加入加密聊天</p>
            </div>
            
            {% if error %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" class="space-y-4">
                <div>
                    <label class="block text-gray-700 mb-2">用户名</label>
                    <input type="text" name="username" required
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2">密码</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <button type="submit"
                        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                    注册
                </button>
            </form>
            
            <div class="text-center mt-4">
                <a href="/login" class="text-blue-600 hover:underline">已有账号？立即登录</a>
            </div>
        </div>
    </div>
</body>
</html>
